<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoE2 Builds</title>
<style>
:root{--bg:#0a0a12;--card:#14141f;--card2:#1c1c2e;--border:#2a2a3e;--text:#dedee6;--text2:#8a8a9a;--accent:#c44b2b;--gold:#c7a040;--green:#3da85c;--blue:#4a8fbf;--purple:#8b5cf6;--radius:12px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.hdr{text-align:center;padding:2rem 1rem 0.5rem}
.hdr h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{color:var(--text2);font-size:0.85rem;margin-top:0.2rem}
.hdr .sub-info{color:var(--text2);font-size:0.7rem;margin-top:0.3rem}
.grid{max-width:820px;margin:1rem auto;padding:0 1rem;display:grid;grid-template-columns:repeat(4,1fr);gap:0.6rem}
.card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:0.8rem 0.4rem;cursor:pointer;text-align:center;transition:all 0.2s}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card.sel{border-color:var(--accent);background:rgba(196,75,43,0.08);box-shadow:0 0 0 2px var(--accent)}
.card .em{font-size:2rem;display:block;margin-bottom:0.2rem}
.card .nm{font-weight:700;font-size:0.85rem}
.card .sub{color:var(--text2);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.5px}
.card.locked{opacity:0.35;cursor:not-allowed;filter:grayscale(0.7)}
.card.locked:hover{border-color:var(--border);transform:none}
.btn-wrap{text-align:center;margin:0.8rem 0;padding:0 1rem;display:flex;flex-direction:column;align-items:center;gap:0.4rem}
.btn{background:var(--accent);color:#fff;border:none;padding:0.8rem 2.5rem;font-size:1.05rem;font-weight:700;border-radius:10px;cursor:pointer;transition:all 0.2s;width:100%;max-width:300px}
.btn:hover{background:#d85a38;transform:scale(1.02)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-sm{background:transparent;color:var(--text2);border:1px solid var(--border);padding:0.4rem 1rem;font-size:0.75rem;border-radius:8px;cursor:pointer;transition:all 0.2s}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}
.results{max-width:820px;margin:0 auto 2rem;padding:0 1rem;display:none}
.results.v{display:block}
.result-count{text-align:center;color:var(--text2);margin-bottom:1rem;font-size:0.9rem}
.build-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;margin-bottom:0.8rem;position:relative;overflow:hidden}
.build-card.best{border-color:var(--gold);box-shadow:0 0 20px rgba(199,160,64,0.15)}
.build-card.best::before{content:'★ MELHOR BUILD';position:absolute;top:10px;right:10px;background:var(--gold);color:var(--bg);font-size:0.6rem;font-weight:800;padding:0.2rem 0.5rem;border-radius:4px;text-transform:uppercase;letter-spacing:0.5px}
.build-top{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.5rem}
.build-class{font-size:1.2rem;font-weight:700}
.build-class .em{font-size:1.5rem;margin-right:0.3rem}
.tag{display:inline-block;padding:0.15rem 0.5rem;border-radius:20px;font-size:0.65rem;font-weight:600;text-transform:uppercase}
.tag-source{background:rgba(74,143,191,0.15);color:var(--blue);border:1px solid rgba(74,143,191,0.25)}
.build-link{display:inline-block;margin-top:0.5rem;color:var(--gold);text-decoration:none;font-weight:600;font-size:0.85rem}
.build-link:hover{text-decoration:underline}
.empty{text-align:center;padding:3rem 1rem;color:var(--text2)}
.empty .em{font-size:3rem;display:block;margin-bottom:1rem}
</style>
</head>
<body>
<div class="hdr">
  <h1>PoE2 Builds</h1>
  <p>Selecione uma classe para ver as melhores builds</p>
  <div class="sub-info" id="dataInfo">📦 Dados embedados · <span id="dataDate"></span></div>
</div>
<div class="grid" id="grid"></div>
<div class="btn-wrap">
  <button class="btn" id="btn" onclick="pesquisar()">🔍 Ver Builds</button>
  <button class="btn-sm" onclick="atualizarDados()">🔄 Atualizar dados do Maxroll</button>
</div>
<div class="results" id="results"></div>

<script>
// ═══════════════════════════════════════════
// DADOS EMBEDADOS — 20 builds do Maxroll (02/06/2026)
// ═══════════════════════════════════════════
const BUILDS_DATA = [
  {n:"Minion Army Spirit Walker",c:"witch",u:"/poe2/build-guides/minion-army-spirit-walker-build-guide"},
  {n:"Spirit Walker Twisters",c:"huntress",u:"/poe2/build-guides/spirit-walker-twisters-build-guide"},
  {n:"Arc Stormweaver",c:"sorceress",u:"/poe2/build-guides/arc-stormweaver-build-guide"},
  {n:"Explosive Grenade Ranger Leveling",c:"ranger",u:"/poe2/build-guides/explosive-grenade-gas-grenade-ranger-leveling-build-guide"},
  {n:"Explosive Grenade Huntress",c:"huntress",u:"/poe2/build-guides/explosive-grenade-gas-grenade-huntress-leveling-build-guide"},
  {n:"Explosive Grenade Mercenary",c:"mercenary",u:"/poe2/build-guides/explosive-grenade-gas-grenade-mercenary-leveling-build-guide"},
  {n:"Lightning Arrow Deadeye",c:"ranger",u:"/poe2/build-guides/lightning-arrow-deadeye-build-guide"},
  {n:"Essence Drain Lich",c:"witch",u:"/poe2/build-guides/essence-drain-lich-build-guide"},
  {n:"Storm Wave Monk",c:"monk",u:"/poe2/build-guides/storm-wave-monk-build-guide"},
  {n:"Disciple of Varashta Plant",c:"druid",u:"/poe2/build-guides/disciple-of-varashta-plant-build-guide"},
  {n:"Whirling Assault Martial Artist",c:"monk",u:"/poe2/build-guides/whirling-assault-martial-artist-build-guide"},
  {n:"Grenade Mercenary Guide",c:"mercenary",u:"/poe2/build-guides/grenade-mercenary-guide-witchhunter-tactician-build-guide"},
  {n:"The Spear Huntress Guide",c:"huntress",u:"/poe2/build-guides/the-spear-huntress-guide-build-guide"},
  {n:"Entangle Oracle",c:"druid",u:"/poe2/build-guides/entangle-oracle-build-guide"},
  {n:"Ice Strike Invoker Monk",c:"monk",u:"/poe2/build-guides/ice-strike-invoker-monk-leveling-build-guide"},
  {n:"Ice Nova Snap Stormweaver",c:"sorceress",u:"/poe2/build-guides/ice-nova-snap-stormweaver-build-guide"},
  {n:"Falling Thunder Invoker",c:"monk",u:"/poe2/build-guides/falling-thunder-invoker-build-guide"},
  {n:"The Shapeshift Druid Guide",c:"druid",u:"/poe2/build-guides/the-shapeshift-druid-guide-build-guide"},
  {n:"Frostbolt Cast On Crit Comet Stormweaver",c:"sorceress",u:"/poe2/build-guides/frostbolt-cast-on-crit-comet-stormweaver-endgame-build-guide"}
];

const CLASSES = [
  {slug:'witch',name:'Bruxa',emoji:'💀',asc:'Infernalist, Blood Mage',locked:false},
  {slug:'sorceress',name:'Feiticeira',emoji:'🪄',asc:'Stormweaver, Chronomancer',locked:false},
  {slug:'ranger',name:'Patrulheira',emoji:'🏹',asc:'Deadeye, Pathfinder',locked:false},
  {slug:'huntress',name:'Caçadora',emoji:'🗡️',asc:'Amazon, Ritualist',locked:false},
  {slug:'monk',name:'Monge',emoji:'🥋',asc:'Invoker, Acolyte of Chayula',locked:false},
  {slug:'mercenary',name:'Mercenário',emoji:'🔫',asc:'Witchhunter, Gemling Legionnaire',locked:false},
  {slug:'warrior',name:'Guerreiro',emoji:'🛡️',asc:'Titan, Warbringer',locked:false},
  {slug:'druid',name:'Druida',emoji:'🐻',asc:'Shaman, Disciple of Varashta',locked:false},
  {slug:'marauder',name:'Bárbaro',emoji:'💪',asc:'—',locked:true},
  {slug:'duelist',name:'Duelista',emoji:'⚔️',asc:'—',locked:true},
  {slug:'shadow',name:'Sombra',emoji:'🌑',asc:'—',locked:true},
  {slug:'templar',name:'Templário',emoji:'✝️',asc:'—',locked:true}
];

let classeSelecionada = null;

document.getElementById('dataDate').textContent = new Date().toLocaleDateString('pt-BR');

function montarGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = CLASSES.map(c => {
    const count = BUILDS_DATA.filter(b => b.c === c.slug).length;
    return `<div class="card${c.locked?' locked':''}${c.slug===classeSelecionada?' sel':''}" 
         ${!c.locked ? `onclick="selecionar('${c.slug}')"` : ''}>
      <span class="em">${c.emoji}</span>
      <span class="nm">${c.name}</span>
      <span class="sub">${c.asc}</span>
      ${c.locked ? '<span class="sub">Em breve</span>' : `<span class="sub">${count} builds</span>`}
    </div>`;
  }).join('');
}

function selecionar(slug) {
  classeSelecionada = slug;
  montarGrid();
  pesquisar();
}

function pesquisar() {
  if (!classeSelecionada) return;
  const cls = classeSelecionada;
  const results = document.getElementById('results');
  const btn = document.getElementById('btn');
  const classeInfo = CLASSES.find(c => c.slug === cls);

  const builds = BUILDS_DATA.filter(b => b.c === cls);
  const embedCount = builds.length;

  if (embedCount === 0) {
    results.innerHTML = `<div class="empty"><span class="em">🔍</span><p>Nenhuma build embedada para ${classeInfo?.name}.</p></div>`;
    results.classList.add('v');
    return;
  }

  let html = `<div class="result-count">🔎 <strong>${embedCount} builds</strong> para ${classeInfo?.emoji} <strong>${classeInfo?.name}</strong></div>`;
  
  builds.forEach((b, i) => {
    html += `
      <div class="build-card${i===0?' best':''}">
        <div class="build-top">
          <span class="build-class">${classeInfo?.emoji} ${b.n}</span>
        </div>
        <div style="display:flex;gap:0.3rem;flex-wrap:wrap;margin:0.5rem 0">
          <span class="tag tag-source">📋 Maxroll</span>
        </div>
        <a class="build-link" href="https://maxroll.gg${b.u}" target="_blank" rel="noopener">🔗 Ver build completa →</a>
      </div>`;
  });

  results.innerHTML = html;
  results.classList.add('v');
}

function atualizarDados() {
  const info = document.getElementById('dataInfo');
  info.innerHTML = '🔄 Atualizando...';
  
  const proxy = 'https://api.allorigins.dev/raw?url=';
  const url = 'https://maxroll.gg/poe2/build-guides';
  
  fetch(proxy + encodeURIComponent(url))
    .then(r => r.text())
    .then(html => {
      const regex = /<a[^>]*href="(\/poe2\/build-guides\/[^"]*)"[^>]*>.*?<img[^>]*alt="([^"]*build[^"]*guide[^"]*)"[^>]*>/gi;
      const novas = [];
      const slugs = new Set();
      let m;
      while ((m = regex.exec(html)) !== null) {
        const slug = m[1];
        if (slugs.has(slug)) continue;
        slugs.add(slug);
        const name = m[2].replace(/Build Guide/gi,'').replace(/Leveling/gi,'').trim();
        if (name.length > 3) {
          novas.push({n: name.slice(0,80), c: slug.split('-')[0], u: slug});
        }
      }
      if (novas.length > 5) {
        BUILDS_DATA.length = 0;
        BUILDS_DATA.push(...novas);
        if (classeSelecionada) pesquisar();
        info.innerHTML = `✅ Atualizado! ${novas.length} builds do Maxroll · ${new Date().toLocaleDateString('pt-BR')}`;
      } else {
        info.innerHTML = '⚠️ Não foi possível atualizar. Tente mais tarde.';
      }
    })
    .catch(() => {
      info.innerHTML = '⚠️ Falha ao atualizar. Proxy indisponível.';
    });
}

// Init
montarGrid();
</script>
</body>
</html>
